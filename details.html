<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieMate | Title Details</title>
    <meta
      name="description"
      content="Explore title details, reactions, release dates, and public reviews on MovieMate."
    />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=70" />
  </head>
  <body data-page="details">
    <div class="page-shell detail-shell">
      <nav class="topbar compact">
        <a class="brand" href="/explore/">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">MovieMate</span>
        </a>
        <div class="topbar-actions">
          <a class="ghost-link" href="/explore/">Back to Browse</a>
          <a class="ghost-link" href="contact.html">Contact</a>
          <button class="ghost-link" id="ownerToggle" type="button">Owner Mode</button>
          <div class="account-menu-wrap">
            <button class="ghost-link account-top-link" data-auth-toggle type="button">
              <span class="account-chip-avatar hidden" data-account-avatar>MM</span>
              <span class="account-chip-label" data-account-label>Sign In</span>
            </button>
            <div class="account-menu hidden" aria-hidden="true">
              <a class="account-menu-link hidden" data-account-only data-profile-link href="profile.html">My Profile</a>
              <a class="account-menu-link hidden" data-account-only href="my-reviews.html">My Reviews</a>
              <a class="account-menu-link hidden" data-account-only data-account-settings-link href="account.html">Settings</a>
              <button class="account-menu-link hidden danger" data-account-only data-signout-action type="button">Logout</button>
              <button class="account-menu-link" data-signed-out-only data-signin-action type="button">Sign In</button>
            </div>
          </div>
        </div>
      </nav>

      <main class="detail-page" id="movieDetails"></main>
    </div>

    <div class="overlay-modal hidden" id="ownerEditModal" aria-hidden="true">
      <button class="overlay-backdrop" data-close-owner-edit="true" type="button" aria-label="Close edit form"></button>
      <div class="overlay-card">
        <button class="overlay-close" id="ownerEditClose" type="button" aria-label="Close edit form">&times;</button>
        <p class="eyebrow">Owner edit</p>
        <h2 class="overlay-title">Edit title details</h2>
        <form class="overlay-form" id="ownerEditForm">
          <input type="hidden" name="id" />
          <label class="input-group">
            <span>Title</span>
            <input name="title" type="text" required />
          </label>
          <label class="input-group">
            <span>Type</span>
            <select name="type" required>
              <option value="Movie">Movie</option>
              <option value="Series">Series</option>
            </select>
          </label>
          <label class="input-group">
            <span>Status</span>
            <select name="status" required>
              <option value="Released">Released</option>
              <option value="Upcoming">Upcoming</option>
            </select>
          </label>
          <label class="input-group">
            <span>Genre</span>
            <input name="genre" type="text" required />
          </label>
          <label class="input-group form-span">
            <span>Languages, separated by commas</span>
            <input name="language" type="text" required />
          </label>
          <label class="input-group form-span">
            <span>Platforms, separated by commas</span>
            <input name="platforms" type="text" placeholder="Netflix, Prime Video, Theatres" />
          </label>
          <label class="input-group">
            <span>Release date</span>
            <input name="releaseDate" type="date" required />
          </label>
          <label class="input-group form-span">
            <span>Poster image URL</span>
            <input name="image" type="url" required />
          </label>
          <label class="input-group form-span">
            <span>Trailer URL</span>
            <input name="trailerUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." />
          </label>
          <label class="input-group">
            <span>Director</span>
            <input name="director" type="text" />
          </label>
          <label class="input-group">
            <span>Main lead</span>
            <input name="mainLead" type="text" />
          </label>
          <label class="input-group">
            <span>Heroine</span>
            <input name="heroine" type="text" />
          </label>
          <label class="input-group form-span">
            <span>Cast names, separated by commas</span>
            <textarea name="castText" rows="3"></textarea>
          </label>
          <label class="input-group form-span">
            <span>Crew names and roles</span>
            <textarea name="crewText" rows="3" placeholder="Name - Role, Name - Role"></textarea>
          </label>
          <label class="input-group form-span">
            <span>Description</span>
            <textarea name="description" rows="5" required></textarea>
          </label>
          <div class="form-actions">
            <button class="primary-btn" type="submit">Save Changes</button>
            <p class="form-message" id="ownerEditMessage" aria-live="polite"></p>
          </div>
        </form>
      </div>
    </div>

    <div class="overlay-modal hidden" id="trailerModal" aria-hidden="true">
      <button class="overlay-backdrop" data-close-trailer="true" type="button" aria-label="Close trailer"></button>
      <div class="overlay-card overlay-card-wide trailer-modal-card">
        <button class="overlay-close" id="trailerModalClose" type="button" aria-label="Close trailer">&times;</button>
        <div class="trailer-modal-frame-shell">
          <iframe
            id="trailerModalFrame"
            class="trailer-modal-frame"
            src=""
            title="MovieMate trailer"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>

    <div class="overlay-modal hidden" id="authModal" aria-hidden="true">
      <button class="overlay-backdrop" data-close-auth="true" type="button" aria-label="Close account modal"></button>
      <div class="overlay-card auth-overlay">
        <button class="overlay-close" id="authClose" type="button" aria-label="Close account modal">&times;</button>
        <div class="auth-tab-row">
          <button class="schedule-type-pill active" id="authLoginTab" type="button">Login</button>
          <button class="schedule-type-pill" id="authSignupTab" type="button">Sign Up</button>
        </div>
        <p class="eyebrow">Your MovieMate account</p>
        <h2 class="overlay-title" id="authTitle">Sign in to MovieMate</h2>
        <p class="section-copy" id="authHint">Sign in to keep collections, member reactions, and your watch progress across devices.</p>
        <form class="overlay-form auth-form-single" id="authForm" data-mode="login">
          <label class="input-group hidden" id="authNameField">
            <span>Name</span>
            <input name="displayName" type="text" placeholder="Your name" />
          </label>
          <label class="input-group form-span">
            <span>Email</span>
            <input name="email" type="email" required />
          </label>
          <label class="input-group form-span">
            <span>Password</span>
            <input name="password" type="password" required />
          </label>
          <div class="form-actions auth-actions">
            <button class="primary-btn" id="authSubmit" type="submit">Sign In</button>
            <button class="ghost-link" id="forgotPasswordBtn" type="button">Forgot Password?</button>
          </div>
          <p class="form-message" id="authMessage" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <script type="module" src="app.js?v=125"></script>
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "a3795ec89854463a9b90761fb384fb6c"}'></script><!-- End Cloudflare Web Analytics -->
  </body>
</html>
