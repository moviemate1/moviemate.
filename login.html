<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieMate | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="login">
    <div class="page-shell auth-page-shell">
      <nav class="topbar compact">
        <a class="brand" href="index.html">MovieMate</a>
        <a class="ghost-link" href="index.html">Back to Browse</a>
      </nav>

      <main class="auth-page">
        <section class="auth-page-card">
          <p class="eyebrow">Members only</p>
          <h1 class="auth-heading">Login to rate, comment, and suggest titles</h1>
          <p class="auth-copy">
            Browsing is open to everyone. Sign in with your email to join the community.
          </p>

          <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
            <button class="auth-tab active" id="loginTab" type="button" data-auth-mode="login">
              Login
            </button>
            <button class="auth-tab" id="signupTab" type="button" data-auth-mode="signup">
              Sign Up
            </button>
          </div>

          <form class="auth-form" id="authForm">
            <label class="input-group">
              <span>Email</span>
              <input id="authEmail" name="email" type="email" required />
            </label>

            <label class="input-group">
              <span>Password</span>
              <input id="authPassword" name="password" type="password" minlength="6" required />
            </label>

            <label class="input-group hidden" id="confirmPasswordGroup">
              <span>Confirm password</span>
              <input
                id="authConfirmPassword"
                name="confirmPassword"
                type="password"
                minlength="6"
              />
            </label>

            <button class="text-link-btn" id="forgotPasswordBtn" type="button">
              Forgot password?
            </button>

            <button class="primary-btn" id="authSubmit" type="submit">Login</button>
            <p class="form-message" id="authMessage" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
