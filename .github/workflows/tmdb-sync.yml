name: Sync TMDb Titles

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: tmdb-title-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Sync current OTT, theatre, upcoming, trending, and major streaming titles
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TMDB_EXTRA_SEARCH_QUERIES: ${{ vars.TMDB_EXTRA_SEARCH_QUERIES }}
          TMDB_EXTRA_OTT_PLATFORMS: ${{ vars.TMDB_EXTRA_OTT_PLATFORMS }}
        run: npm run sync:tmdb
